#############
#  general  #
#############

set -g base-index 1

###########
#  theme  #
###########

set -g status-style "fg=white,bg=black"

#################
#  keybindings  #
#################

# prefix
set -g prefix C-q

#################
#  prefix mode  #
#################

bind k select-pane -U
bind j select-pane -D
bind h select-pane -L
bind l select-pane -R

#################
#  ctrl-w mode  #
#################
bind -T ctrl-w s split-window -v -c "#{path_current_path}" \;\
  switch-client -T prefix
bind -T ctrl-w v split-window -h -c "#{path_current_path}" \;\
  switch-client -T prefix
